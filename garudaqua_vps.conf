server {
    server_name garudaqua.in www.garudaqua.in;

    # ── Service Worker — MUST never be cached at any layer ──
    location = /sw.js {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        proxy_hide_header X-Powered-By;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        add_header Service-Worker-Allowed "/";
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        expires -1;
    }

    # Enable pre-compressed assets
    gzip_static on;

    # ── Next.js hashed static assets — immutable, cache forever ──
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        proxy_hide_header X-Powered-By;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Cache-Status "STATIC";
        access_log off;
    }

    # ── Public static files (images, icons, fonts, manifests) ──
    location ~* \.(webp|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot|mp4)$ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        proxy_hide_header X-Powered-By;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        access_log off;
    }

    # ── Manifests (json/xml) — moderate cache, needed for PWA ──
    location ~* \.(json|xml|txt|webmanifest)$ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        proxy_hide_header X-Powered-By;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800" always;
        access_log off;
    }

    # ── Next.js image optimization endpoint ──
    location /_next/image {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Vary;
        proxy_hide_header Link;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800" always;
        add_header Vary "Accept-Encoding" always;

        # nginx proxy cache for optimized images
        proxy_cache NEXTCACHE;
        proxy_cache_key $scheme$request_uri;
        proxy_ignore_headers Cache-Control Set-Cookie Vary;
        proxy_cache_valid 200 60m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status always;

        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # ── Public read-only API routes — NO CACHE ──
    location ~ ^/api/(hero-slides|hero-videos|gallery|categories|subcategories|blog-categories|products|blogs|search) {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
        
        # Disable Nginx caching entirely
        add_header Cache-Control "private, no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ── Admin API + Auth — never cache ──
    location ~ ^/api/(admin|auth) {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
        client_max_body_size 50M;
        add_header Cache-Control "private, no-cache, no-store" always;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ── POST/mutation API (enquiries etc) — never cache ──
    location /api/enquiries {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
        client_max_body_size 50M;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ── Fallback API — no cache ──
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
        client_max_body_size 50M;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ── Main proxy — HTML pages NO CACHE ──
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;

        proxy_hide_header X-Powered-By;
        
        # Disable Nginx caching entirely
        add_header Cache-Control "private, no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    listen 443 ssl http2;
    ssl_certificate /etc/ssl/cloudflare/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/key.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.garudaqua.in) {
        return 301 https://$host$request_uri;
    }

    if ($host = garudaqua.in) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name garudaqua.in www.garudaqua.in;
    return 404;
}
